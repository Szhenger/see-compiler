syntax = "proto3";

// This namespace is critical. It ensures the generated C++ code 
// lives inside `seecpp::ir` to avoid global namespace pollution.
package seecpp.ir;

// Represents the Coordinate Space (D)
enum DataType {
  DATA_TYPE_UNKNOWN = 0;
  DATA_TYPE_FLOAT32 = 1;
  DATA_TYPE_FLOAT64 = 2;
  DATA_TYPE_INT32 = 3;
  DATA_TYPE_INT64 = 4;
}

// Represents the Shape (S) and Strides (\Sigma)
message TensorShape {
  repeated int64 dimensions = 1; 
  // Strides are optional at ingress; the Middle-End Mapper will calculate them 
  // if they are empty, but we allow the Frontend to pre-populate them.
  repeated int64 strides = 2;    
}

// The core Tensor metadata representation
message TensorNode {
  string name = 1;
  DataType dtype = 2;
  TensorShape shape = 3;
  
  // If true, this is a static weight mapped to the pre-allocated binary blob
  bool is_constant = 4; 
}

// A generic attribute wrapper for operator properties
message Attribute {
  enum Type { 
    INT = 0; 
    FLOAT = 1; 
    INTS = 2; 
    FLOATS = 3; 
    STRING = 4; 
  }
  Type type = 1;
  
  int64 i = 2;
  float f = 3;
  repeated int64 ints = 4;
  repeated float floats = 5;
  string s = 6;
}

// Represents the Functional Mapping f(x)
message OperatorNode {
  string op_type = 1;              // e.g., "MatMul", "Relu", "Conv"
  string name = 2;
  
  repeated string inputs = 3;      // Names of input TensorNodes
  repeated string outputs = 4;     // Names of output TensorNodes
  
  map<string, Attribute> attributes = 5;
}

// The fully reconstructed DAG
message Graph {
  // We use lists instead of maps here to preserve the Topological Sort order
  repeated TensorNode tensors = 1;
  repeated OperatorNode operators = 2;
}
