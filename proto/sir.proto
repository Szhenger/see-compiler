syntax = "proto3";

package seecpp.sir;

// 1. Data Types supported by the SeeC++ Engine
enum DataType {
  F32 = 0;
  I32 = 1;
  I64 = 2;
  BOOL = 3;
}

// 2. Tensor Shape information
message ShapeProto {
  repeated int64 dims = 1;
  bool is_static = 2;
}

// 3. The Value (SSA Handle)
message ValueProto {
  string id = 1;         // e.g., "%42"
  DataType dtype = 2;
  ShapeProto shape = 3;
}

// 4. Attributes (The variant logic)
message AttributeProto {
  oneof value {
    int64 i = 1;
    float f = 2;
    string s = 3;
    IntList ints = 4;
  }
}

message IntList {
  repeated int64 values = 1;
}

// 5. The Operation
message OperationProto {
  string mnemonic = 1;                    // e.g., "sc_high.conv2d"
  repeated string operand_ids = 2;        // References to ValueProto IDs
  repeated ValueProto results = 3;        // The values this op creates
  map<string, AttributeProto> attributes = 4;
}

// 6. The Block (The complete Graph)
message BlockProto {
  repeated OperationProto operations = 1;
  bool is_validated = 2;
}